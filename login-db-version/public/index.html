<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录数据库版日本旅行规划器</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <h1>登录数据库版日本旅行规划器</h1>
        <p>注册登录后，收藏会保存到服务端 JSON 数据库。</p>
      </header>

      <section class="auth-panel">
        <div>
          <h2>账号</h2>
          <p id="userStatus" class="muted">未登录</p>
        </div>
        <div class="auth-form">
          <input id="usernameInput" placeholder="用户名" />
          <input id="passwordInput" type="password" placeholder="密码" />
          <button id="registerButton" type="button">注册</button>
          <button id="loginButton" type="button">登录</button>
          <button id="logoutButton" type="button">退出</button>
        </div>
        <p id="message" class="message"></p>
      </section>

      <section class="controls">
        <label>
          城市
          <select id="citySelect">
            <option value="all">全部城市</option>
          </select>
        </label>

        <label>
          搜索
          <input id="searchInput" type="search" placeholder="例如：寺庙、美食、夜景" />
        </label>
      </section>

      <main class="layout">
        <section>
          <div class="section-title">
            <h2>地点</h2>
            <span id="placeCount">0 个地点</span>
          </div>
          <div id="spotsContainer" class="card-list"></div>
        </section>

        <aside>
          <h2>我的收藏</h2>
          <ul id="favoritesList"></ul>
          <p id="emptyFavorites" class="muted">登录后可以保存收藏。</p>
        </aside>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
