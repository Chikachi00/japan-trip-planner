<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>地图版日本旅行规划器</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <h1>地图版日本旅行规划器</h1>
        <p>使用 Leaflet 地图 API 和 OpenStreetMap 显示地点位置。</p>
      </header>

      <section class="controls">
        <label>
          城市
          <select id="citySelect">
            <option value="all">全部城市</option>
          </select>
        </label>

        <label>
          搜索
          <input id="searchInput" type="search" placeholder="例如：寺庙、美食、夜景" />
        </label>
      </section>

      <main class="layout">
        <section>
          <div class="section-title">
            <h2>地点</h2>
            <span id="placeCount">0 个地点</span>
          </div>
          <div id="spotsContainer" class="card-list"></div>
        </section>

        <section class="map-panel">
          <div id="map"></div>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
