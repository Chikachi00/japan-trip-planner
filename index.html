<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日本旅行规划器</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <h1>日本旅行规划器</h1>
        <p>按城市或关键词查找地点，并收藏想去的地方。</p>
      </header>

      <section class="controls">
        <label>
          城市
          <select id="citySelect">
            <option value="all">全部城市</option>
          </select>
        </label>

        <label>
          搜索
          <input id="searchInput" type="search" placeholder="例如：寺庙、美食、夜景" />
        </label>
      </section>

      <main class="layout">
        <section>
          <div class="section-title">
            <h2>地点</h2>
            <span id="placeCount">0 个地点</span>
          </div>
          <div id="spotsContainer" class="card-list"></div>
        </section>

        <aside>
          <div class="section-title">
            <h2>收藏</h2>
            <button id="clearFavorites" type="button">清空</button>
          </div>
          <ul id="favoritesList"></ul>
          <p id="emptyFavorites" class="muted">还没有收藏地点。</p>
        </aside>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
